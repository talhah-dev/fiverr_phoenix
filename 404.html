<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix & A</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./docs/Style.css" />

</head>

<body class="overflow-x-hidden">
    <section id="not-found" class="relative min-h-screen w-full overflow-hidden flex items-center justify-center">

        <div class="absolute inset-0 w-full h-full">
            <img src="/docs/assets/bg.png" alt="Background" class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-black/40"></div>
        </div>

        <div class="relative z-10 flex flex-col items-center justify-center text-center px-4">

            <div
                class="relative flex flex-col items-center justify-center md:px-20 px-16 py-12 rounded-3xl overflow-hidden">

                <div class="absolute inset-0 bg-white/10 backdrop-blur-lg rounded-3xl"></div>

                <div class="relative z-10 flex flex-col items-center gap-4">

                    <span
                        class="text-[72px] lg:text-[128px] font-bold leading-none text-white/30 tracking-tight select-none">
                        404
                    </span>

                    <h1
                        class="text-[24px] lg:text-[64px] font-bold uppercase tracking-tight text-white leading-none mt-6">
                        Page Not Found
                    </h1>

                    <div class="flex items-center gap-2 mt-4">
                        <a href="./index.html"
                            class="rounded-full bg-white/90 px-7 py-3 text-sm font-medium text-[#1a1a1a] transition hover:bg-white">
                            Back to Home
                        </a>
                        <div class="w-10 h-10 rounded-full bg-[#1a1a1a] flex items-center justify-center shrink-0">
                            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="white"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="2" y1="12" x2="12" y2="2" />
                                <polyline points="5,2 12,2 12,9" />
                            </svg>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </section>


</body>

</html>
